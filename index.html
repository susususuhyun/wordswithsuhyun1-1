<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>얼룩말영어학원 고난도 단어장</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; }
        .card-flip { perspective: 1000px; }
        .card-inner { transition: transform 0.5s; transform-style: preserve-3d; }
        .card-flipped { transform: rotateY(180deg); }
        .card-front, .card-back { backface-visibility: hidden; }
        .card-back { transform: rotateY(180deg); }
    </style>
</head>
<body class="flex justify-center min-h-screen">

    <div class="w-full max-w-md bg-white shadow-xl flex flex-col justify-between min-h-screen border-x border-slate-200">
        
        <header class="bg-indigo-600 text-white p-4 text-center shadow-md">
            <h1 class="text-xl font-bold tracking-wide">🦓 얼룩말영어학원</h1>
            <p class="text-xs text-indigo-200 mt-1 font-medium">중등 고난도 17과 단어장 (어원·동계어)</p>
        </header>

        <main class="flex-1 p-4 overflow-y-auto">
            
            <div class="grid grid-cols-1 gap-2 mb-4">
                <button class="bg-indigo-600 text-white font-semibold py-2 rounded-lg text-sm transition shadow-sm">Day 17</button>
            </div>

            <div class="flex justify-end gap-2 mb-4 text-xs font-medium">
                <button onclick="switchMode('list')" id="mode-list" class="px-3 py-1.5 rounded-full bg-slate-800 text-white shadow">목록 보기</button>
                <button onclick="switchMode('card')" id="mode-card" class="px-3 py-1.5 rounded-full bg-slate-200 text-slate-700">카드 학습</button>
            </div>

            <div id="vocab-container" class="space-y-3"></div>

        </main>

        <footer class="bg-slate-50 border-t border-slate-200 p-3 text-center text-xs text-slate-400" id="app-footer">
            © 얼룩말영어학원 | 스마트 단어 학습 시스템
        </footer>
    </div>

    <script>
        const vocabData = [
            { word: "backbone", meaning: "척추, 등뼈", etymology: "back(등) + bone(뼈). 몸의 중심을 지탱하는 척추를 뜻하며, 비유적으로 조직의 '중추'나 사람의 '기개'를 의미함.", cognates: "backboned (척추가 있는), backboneless (줏대 없는)" },
            { word: "injection", meaning: "주사", etymology: "in-(안으로) + ject(던지다, 넣다) + ion. 피부나 근육 조직 안으로 약체를 강하게 '밀어 넣는 행위'.", cognates: "inject (주사하다, 주입하다), injector (주입기)" },
            { word: "heal up", meaning: "상처가 완치되다", etymology: "heal(온전하게 만들다) + 부사 up(완전히). 쪼개지고 다친 상처가 새살로 덮여 완전히 원래 상태로 치유됨.", cognates: "healing (치유), health (건강)" },
            { word: "recovery", meaning: "회복", etymology: "re-(다시) + 라틴어 capere(잡다)에서 파생. 질병이나 사고로 잃어버렸던 건강과 체력을 '다시 붙잡아 찾아옴'.", cognates: "recover (회복하다), recoverable (회복 가능한)" },
            { word: "prescription", meaning: "처방", etymology: "pre-(미리, 사전에) + script(쓰다) + ion. 약을 조제하기 전에 의사가 환자에게 필요한 약 성분을 '미리 글로 적어두는 것'.", cognates: "prescribe (처방하다, 규정하다), prescriptive (지시적인)" },
            { word: "vision, eyesight", meaning: "시각, 시력", etymology: "vision은 라틴어 videre(보다), eyesight는 eye(눈) + sight(보는 능력). 눈으로 사물을 식별하고 인지할 수 있는 신체적 역량.", cognates: "visual (시각의), visible (눈에 보이는)" },
            { word: "allergic", meaning: "알레르기의", etymology: "그리스어 allos(다른, 변형된) + ergon(반응, 작업). 특정 물질에 대해 면역계가 일반 사람과 '다르게 과민 반응하는 것'에서 유래.", cognates: "allergy (알레르기), allergen (알레르기 유발 물질)" },
            { word: "get well, get better", meaning: "치유되다, 치료하다, 고치다", etymology: "well/better(더 좋은 건강 상태)를 get(획득하다). 병세가 호전되어 신체 기능이 정상 궤도로 올라서는 상태.", cognates: "well-being (웰빙, 행복)" },
            { word: "physically challenged", meaning: "장애를 입은, 장애의", etymology: "physically(신체적으로) + challenged(도전에 직면한). '장애인'을 완곡하게 표현한 현대적 언어학적 결합.", cognates: "physical (신체의), challenge (도전)" },
            { word: "emergency room (ER)", meaning: "응급실", etymology: "emergency(돌발 위기 상황) + room(방). 급성 질환이나 치명적인 외상을 입은 환자를 즉각 치료하기 위해 마련된 병원 내 공간.", cognates: "emerge (나타나다)" },
            { word: "disability", meaning: "장애", etymology: "dis-(부정/반대) + ability(능력). 신체적 또는 정신적 손상으로 인해 일상적인 활동 능력이 일정 부분 제한된 상태.", cognates: "disable (장애를 갖게 하다), able (할 수 있는)" },
            { word: "take in", meaning: "소화하다", etymology: "take(잡아취하다) + in(안으로). 음식이나 영양소, 혹은 지식을 몸과 머리 안으로 받아들여 자기 것으로 흡수하는 행위.", cognates: "intake (섭취)" },
            { word: "infect", meaning: "감염시키다", etymology: "in-(안으로) + 라틴어 facere(만들다/염색하다). 병균이나 바이러스가 신체 내부로 침투하여 유해한 상태를 유발하거나 전염시킴.", cognates: "infection (감염), infectious (전염성의)" },
            { word: "emergent", meaning: "긴급한, 응급의", etymology: "e-(밖으로) + merge(잠기다/떠오르다). 물속에 잠겨 있던 위협적인 돌발 상황이 수면 '밖으로 갑자기 솟구쳐 오른' 양상.", cognates: "emergency (비상사태), emerge (출현하다)" },
            { word: "medical examination", meaning: "건강 검진", etymology: "medical(의학의) + examination(조사/시험). 질병의 예방 및 조기 발견을 위해 몸 전체를 의학적으로 정밀하게 살피는 과정.", cognates: "examine (조사하다), examiner (검사관)" },
            { word: "get a bruise", meaning: "타박상을 입다", etymology: "get(얻다) + bruise(고대 영어 brysan-부수다/찧다). 외부 충격으로 인해 피부 내부의 미세혈관이 터져 멍이 드는 상태.", cognates: "bruised ( 멍든)" },
            { word: "worse", meaning: "악화된, 더 심한", etymology: "고대 영어 wyrs(더 나쁜)에서 유래. 질병의 증상이나 상태가 기존의 기준점보다 더 부정적인 방향으로 나아간 상태.", cognates: "worsen (악화되다)" },
            { word: "crisis, danger", meaning: "비상사태, 위급", etymology: "crisis는 그리스어 krinein(분별하다/결정하다)에서 유래하여 생사가 갈리는 중대한 전환점, danger는 해를 입을 수 있는 위험 요인.", cognates: "critical (비판적인, 중대한)" },
            { word: "sign, mark", meaning: "징후, 증상", etymology: "라틴어 signum(표시, 신호)에서 유래. 몸 내부의 질병이나 이상 상태가 겉으로 드러나 보이는 객관적인 지표.", cognates: "signal (신호), signature (서명)" },
            { word: "be in good condition", meaning: "건강 상태가 좋다", etymology: "condition은 라틴어 condicere(함께 합의하다/상태). 신체의 모든 장기와 기능이 조화롭게 잘 맞물려 최상의 효율을 내는 상태.", cognates: "conditional (조건부의)" },
            { word: "physical", meaning: "신체의, 육체의", etymology: "그리스어 physis(자연, 물질적 본질)에서 유래. 정신이나 영혼과 대비되는, 만질 수 있고 존재하는 인간의 물질적 몸.", cognates: "physician (내과의사), physics (물리학)" },
            { word: "insanitary", meaning: "비위생적인", etymology: "in-(부정/반대) + sanitary(위생적인). 환경이나 가사 상태가 깨끗하지 못하여 병균이 번식하고 질병을 유발할 위험이 높은.", cognates: "sanitary (위생의), sanity (온전한 정신)" },
            { word: "injury", meaning: "상처", etymology: "in-(부정/반대) + 라틴어 jus(법/권리). 원래 타인의 권리를 침해하는 가해 행위에서 유래하여, 신체에 입은 물리적 타격과 손상을 뜻함.", cognates: "injure (부상을 입히기), injurious (해로운)" },
            { word: "dental clinic", meaning: "치과", etymology: "라틴어 dens(이빨) + clinic(그리스어 kline-침대/병상). 치아 및 구강 구조의 질환을 전문적으로 예방하고 치료하는 의료 기관.", cognates: "dentist (치과의사), dental (치아의)" },
            { word: "strain oneself", meaning: "무리하다, 무리하여 건강을 해치다", etymology: "strain(라틴어 stringere-팽팽하게 잡아당기다). 자신의 신체적·정신적 한계선 이상으로 에너지를 과도하게 쥐어짜 내어 몸을 상하게 함.", cognates: "strainer (여과기), constrained (강요된)" },
            { word: "infectious", meaning: "전염성의", etymology: "infect(균을 침투시키다) + ious(가득 찬). 바이러스나 박테리아가 공기, 접촉 등을 통해 타인의 신체로 쉽게 전파되는 특성.", cognates: "infection (감염), infectiously (전염성 있게)" },
            { word: "sensitivity", meaning: "알레르기, 과민증", etymology: "라틴어 sentire(느끼다) + itivty. 외부의 미세한 자극이나 특정 항원에 대해 몸이 지나치게 민감하게 감지하고 반응하는 성질.", cognates: "sensitive (민감한), sense (감각)" },
            { word: "have good sight", meaning: "시력이 좋다", etymology: "have(가지다) + sight(고대 영어 gesiht-보는 능력). 안구의 조절 기능과 망막의 상태가 우수하여 멀고 가까운 사물을 선명하게 잘 보는 상태.", cognates: "sightseeing (관광)" },
            { word: "sanitate", meaning: "위생적으로 하다", etymology: "라틴어 sanitas(건강, 온전함)에서 파생. 공공장소나 주거 환경에서 병균을 제거하고 청결을 유지하여 건강한 환경을 구축하다.", cognates: "sanitation (위생 시설), sanitary (위생의)" },
            { word: "immunity", meaning: "면역", etymology: "im-(부정/면제) + 라틴어 munus(의무, 세금). 원래 국가적 의무나 세금을 '면제받다'에서 유래하여, 외부 병원균의 공격으로부터 몸이 보호받는 상태.", cognates: "immune (면역성이 있는), immunize (면역력을 갖게 하다)" },
            { word: "digestion", meaning: "소화", etymology: "di-(사방으로) + 라틴어 gerere(나르다, 운반하다) + tion. 섭취한 음식물을 위장관에서 분해하여 사방의 세포로 영양소를 나누어 보내는 과정.", cognates: "digest (소화하다, 요약하다), digestive (소화의)" },
            { word: "mental illness", meaning: "정신질환", etymology: "mental(라틴어 mens-마음/이성) + illness(질병). 신체적 상처와 대비되는, 뇌 기능이나 마음의 영역에서 발생하여 일상을 방해하는 심리적·정신적 장애.", cognates: "mentality (정신성), ill (아픈)" }
        ];

        let currentMode = 'list';
        let cardIndex = 0;

        function switchMode(mode) {
            currentMode = mode;
            cardIndex = 0;
            const listBtn = document.getElementById('mode-list');
            const cardBtn = document.getElementById('mode-card');

            if(mode === 'list') {
                listBtn.className = "px-3 py-1.5 rounded-full bg-slate-800 text-white shadow";
                cardBtn.className = "px-3 py-1.5 rounded-full bg-slate-200 text-slate-700";
            } else {
                cardBtn.className = "px-3 py-1.5 rounded-full bg-slate-800 text-white shadow";
                listBtn.className = "px-3 py-1.5 rounded-full bg-slate-200 text-slate-700";
            }
            renderContent();
        }

        function renderContent() {
            const container = document.getElementById('vocab-container');
            const footer = document.getElementById('app-footer');

            if (currentMode === 'list') {
                footer.innerHTML = `© 얼룩말영어학원 | 스마트 단어 학습 시스템`;
                container.innerHTML = vocabData.map((item, idx) => `
                    <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 shadow-sm">
                        <div class="flex justify-between items-start">
                            <span class="text-xs text-indigo-500 font-bold uppercase tracking-wider">No. ${idx + 1}</span>
                            <span class="text-xl font-bold text-slate-800">${item.word}</span>
                        </div>
                        <div class="mt-2 text-sm font-medium text-slate-600 border-t border-slate-200/60 pt-2">
                            <span class="text-indigo-600">뜻:</span> ${item.meaning}
                        </div>
                        <div class="mt-2 text-xs text-slate-500 bg-white p-2 rounded border border-slate-100">
                            <strong class="text-amber-600">💡 어원:</strong> ${item.etymology}
                        </div>
                        <div class="mt-1 text-xs text-slate-500 bg-white p-2 rounded border border-slate-100">
                            <strong class="text-emerald-600">🌿 동계어:</strong> ${item.cognates}
                        </div>
                    </div>
                `).join('');
            } else {
                const item = vocabData[cardIndex];
                footer.innerHTML = `
                    <div class="flex justify-between items-center px-4 py-1">
                        <button onclick="prevCard()" class="px-4 py-2 bg-slate-200 text-slate-700 font-bold rounded-lg ${cardIndex === 0 ? 'opacity-50 pointer-events-none' : ''}">이전</button>
                        <span class="font-semibold text-slate-600">${cardIndex + 1} / ${vocabData.length}</span>
                        <button onclick="nextCard()" class="px-4 py-2 bg-indigo-600 text-white font-bold rounded-lg ${cardIndex === vocabData.length - 1 ? 'opacity-50 pointer-events-none' : ''}">다음</button>
                    </div>
                `;
                
                container.innerHTML = `
                    <div class="text-center text-xs text-slate-400 mb-2">💡 카드를 터치하면 뜻과 어원이 나타납니다.</div>
                    <div class="card-flip w-full h-80 cursor-pointer" onclick="flipCard()">
                        <div id="card-inner" class="card-inner w-full h-full relative rounded-2xl shadow-lg border border-slate-200">
                            <div class="card-front absolute w-full h-full bg-indigo-50 flex flex-col justify-center items-center rounded-2xl p-6">
                                <span class="text-xs text-indigo-400 font-bold tracking-widest mb-4">WORD</span>
                                <h2 class="text-4xl font-extrabold text-indigo-700 tracking-tight">${item.word}</h2>
                            </div>
                            <div class="card-back absolute w-full h-full bg-white flex flex-col justify-between rounded-2xl p-6 overflow-y-auto">
                                <div>
                                    <span class="text-xs text-emerald-500 font-bold tracking-widest block mb-2">MEANING</span>
                                    <h3 class="text-xl font-bold text-slate-800 border-b pb-2 border-slate-100">${item.meaning}</h3>
                                </div>
                                <div class="my-3 text-left space-y-2">
                                    <p class="text-xs text-slate-600"><strong class="text-amber-600 block mb-0.5">💡 어원</strong> ${item.etymology}</p>
                                    <p class="text-xs text-slate-600"><strong class="text-emerald-600 block mb-0.5">🌿 동계어</strong> ${item.cognates}</p>
                                </div>
                                <span class="text-[10px] text-slate-300">다시 터치하면 앞면으로 돌아갑니다.</span>
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        function flipCard() {
            document.getElementById('card-inner').classList.toggle('card-flipped');
        }

        function nextCard() {
            if (cardIndex < vocabData.length - 1) {
                cardIndex++;
                renderContent();
            }
        }

        function prevCard() {
            if (cardIndex > 0) {
                cardIndex--;
                renderContent();
            }
        }

        // Init Day 17
        renderContent();
    </script>
</body>
</html>
