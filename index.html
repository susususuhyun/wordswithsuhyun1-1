<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>얼룩말영어학원 고난도 단어장</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; }
        .card-flip { perspective: 1000px; }
        .card-inner { transition: transform 0.5s; transform-style: preserve-3d; }
        .card-flipped { transform: rotateY(180deg); }
        .card-front, .card-back { backface-visibility: hidden; }
        .card-back { transform: rotateY(180deg); }
    </style>
</head>
<body class="flex justify-center min-h-screen">

    <div class="w-full max-w-md bg-white shadow-xl flex flex-col justify-between min-h-screen border-x border-slate-200">
        
        <header class="bg-indigo-600 text-white p-4 text-center shadow-md z-10">
            <h1 class="text-xl font-bold tracking-wide">🦓 얼룩말영어학원</h1>
            <p class="text-xs text-indigo-200 mt-1 font-medium">중등고난도 20, 21, 22 plus 통합 단어장 (원문 순서 고정)</p>
        </header>

        <main class="flex-1 p-4 overflow-y-auto">
            
            <div class="grid grid-cols-3 gap-2 mb-4">
                <button onclick="switchDay(20)" id="tab-20" class="tab-btn bg-indigo-600 text-white font-semibold py-2 rounded-lg text-xs transition shadow-sm">20 plus (46)</button>
                <button onclick="switchDay(21)" id="tab-21" class="tab-btn bg-slate-100 text-slate-600 font-semibold py-2 rounded-lg text-xs transition">21 plus (42)</button>
                <button onclick="switchDay(22)" id="tab-22" class="tab-btn bg-slate-100 text-slate-600 font-semibold py-2 rounded-lg text-xs transition">22 plus (45)</button>
            </div>

            <div class="flex justify-end gap-2 mb-4 text-xs font-medium">
                <button onclick="switchMode('list')" id="mode-list" class="px-3 py-1.5 rounded-full bg-slate-800 text-white shadow">목록 보기</button>
                <button onclick="switchMode('card')" id="mode-card" class="px-3 py-1.5 rounded-full bg-slate-200 text-slate-700">카드 학습</button>
            </div>

            <div id="vocab-container" class="space-y-3 pb-4"></div>

        </main>

        <footer class="bg-slate-50 border-t border-slate-200 p-3 h-14 flex items-center justify-center z-10 text-xs font-medium text-slate-500">
            
            <div id="footer-list-mode" class="w-full text-center text-slate-400">
                © 얼룩말영어학원 | 스마트 단어 학습 시스템
            </div>

            <div id="footer-card-mode" class="w-full flex justify-between items-center px-2 hidden">
                <button onclick="prevCard()" class="px-4 py-1.5 bg-slate-200 text-slate-700 font-bold rounded-lg transition active:bg-slate-300" id="btn-prev">이전</button>
                <span class="font-semibold text-slate-600" id="card-progress">0 / 0</span>
                <button onclick="nextCard()" class="px-4 py-1.5 bg-indigo-600 text-white font-bold rounded-lg transition active:bg-indigo-700" id="btn-next">다음</button>
            </div>

        </footer>
    </div>

    <script>
        const vocabData = {
            20: [
                { word: "friendly", meaning: "친절한", etymology: "friend(친구) + ly(형용사 접미사). 친구처럼 다정하고 온정적이며 대하기 편한 상태.", cognates: "friendliness (친절함), unfriendliness (불친절)" },
                { word: "suppose", meaning: "추측하다. 사실이라고 생각하다", etymology: "sub-(아래에) + 라틴어 ponere(놓다). 어떤 생각을 기초 아래에 깔아두고 잠정적인 결론을 내리다.", cognates: "supposition (가정, 추측), supposedly (추측건대)" },
                { word: "divide, split", meaning: "나누다. 분열시키다", etymology: "divide는 라틴어 dividere(분리하다). split은 네덜란드어 splitten(쪼개다). 하나를 여러 조각으로 가르거나 갈등을 유발하는 행위.", cognates: "division (분할, 부서), split-second (찰나의)" },
                { word: "unionize", meaning: "연합하다", etymology: "라틴어 unus(하나의). 서로 따로 떨어져 있던 주체들이 뜻을 모아 하나의 집단이나 노동조합을 결성하다.", cognates: "union (조합, 연합), unity (통일성)" },
                { word: "elective", meaning: "선거의", etymology: "ex-(밖으로) + 라틴어 legere(고르다). 구성원들의 투표와 선택을 통해 선출하거나 임명하는 체제와 관련된.", cognates: "elect (선출하다), election (선거), elective course (선택과목)" },
                { word: "order", meaning: "명령하다", etymology: "라틴어 ordo(줄, 차례, 질서). 사회적인 서열이나 체계에 맞추어 의무적인 행동을 하도록 요구하는 행위.", cognates: "orderly (질서정연한), disorder (무질서)" },
                { word: "argue", meaning: "논쟁하다", etymology: "라틴어 arguere(명확히 입증하다). 자신의 논리가 옳음을 밝히기 위해 상대방과 대립하여 말로 싸우다.", cognates: "argument (논쟁), arguable (주장할 수 있는)" },
                { word: "indifference", meaning: "무관심", etymology: "in-(부정) + difference(차이). 대상들이 나에게 아무런 차이를 만들지 못하므로 전혀 관심을 두지 않는 상태.", cognates: "indifferent (무관심한)" },
                { word: "achievement", meaning: "업적", etymology: "프랑스어 venir à chef(우두머리에 도달하다, 끝마치다). 오랜 노력 끝에 목표한 정점에 도달하여 이룩한 훌륭한 성과.", cognates: "achieve (달성하다), achiever (성취자)" },
                { word: "put off, delay", meaning: "연기하다. 뒤로 미루다", etymology: "put off는 일정을 멀리 밀어 놓는 구어적 표현. delay는 de-(뒤로) + 라틴어 lagare(지치게 하다/미루다).", cognates: "procrastinate (미루다)" },
                { word: "conservatism", meaning: "보수주의", etymology: "con-(함께) + 라틴어 servare(지키다) + ism. 기존의 사회적 전통, 질서, 가치를 바꾸지 않고 그대로 유지하려는 사상 체계.", cognates: "conservative (보수적인), conserve (보존하다)" },
                { word: "unfriendly", meaning: "적대적인", etymology: "un-(부정) + friendly(친절한). 친구로서의 온정이 전혀 없이 차갑고 공격적인 태도를 취하는 상태.", cognates: "unfriendliness (적대감)" },
                { word: "assure", meaning: "확신시키다", etymology: "ad-(~에게) + 라틴어 securus(안전한, 확신하는). 상대방의 마음속 의심을 완전히 지워주어 안전하고 확실하게 만들다.", cognates: "assurance (확신, 보증), assuredly (확실히)" },
                { word: "cabinet council", meaning: "각료 회의, 국무회의", etymology: "cabinet(작은 방, 내각) + council(회의). 국가의 최고 행정 지배층(장관들)이 모여 주요 정책을 결정하는 공식 의회.", cognates: "counsel (조언)" },
                { word: "conviction", meaning: "확신", etymology: "con-(완전히) + 라틴어 vincere(이기다, 정복하다). 논리적 다툼에서 완전히 이겨 마음에 추호의 의심도 남지 않은 단단한 신념 상태.", cognates: "convince (납득시키다), convinced (확신하는)" },
                { word: "commander", meaning: "지휘관, 사령관", etymology: "com-(강조) + 라틴어 mandare(맡기다, 명령하다). 군대나 거대한 조직의 통제권을 위임받아 대원들을 지휘하는 우두머리.", cognates: "command (명령하다), commandment (계명)" },
                { word: "declaration", meaning: "선언, (세관 등에의) 신고(서)", etymology: "de-(완전히) + 라틴어 clarare(명확하게 밝히다). 자신의 입장, 권리, 혹은 물품의 내역을 대중 앞에 뚜렷이 드러내는 행위.", cognates: "declare (선언하다), declarative (선언적인)" },
                { word: "opposite", meaning: "반대편의", etymology: "ob-(~에 맞서서) + 라틴어 ponere(놓다). 정중앙을 기준으로 다른 쪽 극단이나 맞은편 공간에 마주 보고 놓여 있는.", cognates: "oppose (반대하다), opposition (반대, 야당)" },
                { word: "assuming[supposing] that", meaning: "~라고 가정하면", etymology: "assume/suppose(생각을 취하다) + 접속사 that. 어떤 조건이나 상황이 기정사실로 존재한다고 전제할 때 쓰는 어구.", cognates: "assumption (가정)" },
                { word: "unconcerned", meaning: "무관심한", etymology: "un-(부정) + concern(관계를 맺다) + ed. 나와 하등의 이해관계나 연관성이 없다고 여겨 마음을 전혀 쓰지 않는.", cognates: "concern (우려, 염려)" },
                { word: "fame", meaning: "명성, 덕망", etymology: "라틴어 fama(대중의 대화, 소문). 수많은 사람의 입에 오르내려 널리 알려진 긍정적인 평판과 사회적 인지도.", cognates: "famous (유명한), infamous (악명 높은)" },
                { word: "hostility", meaning: "적의, 적개심", etymology: "라틴어 hostis(이방인, 적). 타인을 향해 드러내는 강한 거부감, 공격 성향, 혹은 전쟁을 치르려는 마음가짐.", cognates: "hostile (적대적인)" },
                { word: "office", meaning: "사무실; 공직, 관직", etymology: "라틴어 officium(의무, 공적 서비스). 공식적인 직무나 비즈니스 업무를 수행하는 공간 또는 국가적 임무 직책.", cognates: "official (공식적인), officer (장교, 경찰관)" },
                { word: "allow", meaning: "찬성하다. 승인하다", etymology: "라틴어 allaudare(칭찬하다)와 allocare(할당하다)의 결합. 타인의 요구나 행동이 정당하다고 인정하여 허락해 주다.", cognates: "allowance (용돈, 허용량)" },
                { word: "Federal Government", meaning: "(미국) 연방 정부", etymology: "foedus(조약, 동맹) + government(정부). 개별 주들이 조약을 통해 연합하여 구성한 상위 통합 국가 행정 기구.", cognates: "federal (연방의), federation (연합)" },
                { word: "assumption", meaning: "가정, 가설", etymology: "ad-(~로) + 라틴어 emere(취하다). 명확한 물증이 없는 상태에서 증거를 임의로 마음에 '먼저 취해 두는' 생각.", cognates: "assume (가정하다)" },
                { word: "power", meaning: "권위, 권한", etymology: "라틴어 posse(~할 수 있다). 타인을 내 뜻대로 통제하고 복종시키거나 공식적인 직무를 집행할 수 있는 정당한 힘.", cognates: "powerful (강력한), powerless (무력한)" },
                { word: "election", meaning: "선거", etymology: "ex-(밖으로) + 라틴어 legere(고르다). 대표자를 선출하기 위해 투표를 통해 밖으로 뽑아내는 공식 절차.", cognates: "elect (선출하다), election (선거)" },
                { word: "nearest", meaning: "직접적인, 가장 가까운", etymology: "near(가까운) + est(최상급 접미사). 인과적 거리선상에서 사이에 아무것도 거치지 않고 곧바로 맞닿아 있는.", cognates: "nearly (거의)" },
                { word: "insistent", meaning: "강요하는, 끈질긴", etymology: "in-(위에) + 라틴어 sistere(서 있다). 자신의 요구가 관철될 때까지 계속 주장하는 양상.", cognates: "insist (주장하다), insistence (집요함)" },
                { word: "approval", meaning: "찬성, 승인", etymology: "ad-(~에게) + 라틴어 probare(좋다고 인정하다). 타인의 의견이 올바르다고 가치를 좋게 평가하여 공식 허락함.", cognates: "approve (승인하다), disapprove (반대하다)" },
                { word: "progressive", meaning: "진보적인", etymology: "pro-(앞으로) + 라틴어 gradi(걷다) + ive. 기존 체제에 안주하지 않고 사회적 변화와 발전을 향해 앞으로 걸어 나가는 성향.", cognates: "progress (진전), progression (진행)" },
                { word: "with insistence", meaning: "끈질기게, 집요하게", etymology: "전치사 with(가지고) + insistence(집요한 고집). 자신의 주장을 꺾지 않고 끝까지 유지하는 태도를 품고.", cognates: "insistently (집요하게)" },
                { word: "officiate", meaning: "공무를 수행하다", etymology: "office(공직, 직무) + ate(동사형 접미사). 자신에게 부여된 공식적인 직책의 의무나 종교적 의식을 법에 맞추어 집행하다.", cognates: "official (공무원, 공식적인)" },
                { word: "reputational", meaning: "명성의, 평판의", etymology: "re-(다시) + 라틴어 putare(생각하다) + ational. 대중들이 대상을 마음속으로 어떻게 평판하느냐와 관련된.", cognates: "reputation (평판, 명성), reputable (평판이 좋은)" },
                { word: "action, conduct", meaning: "행위", etymology: "action은 agere(행하다), conduct는 con(함께) + ducere(이끌다). 내면의 의지나 목적을 가지고 행동으로 실행한 일.", cognates: "act (행동하다), conductor (지휘자)" },
                { word: "announce", meaning: "선언하다. 공표하다", etymology: "ad-(~에게) + 라틴어 nuntiare(소식을 전하다). 새로운 정보나 결정을 대중들에게 공식적인 목소리로 알리다.", cognates: "announcement (발표)" },
                { word: "persuasion", meaning: "설득", etymology: "per-(완전히) + 라틴어 suadere(달콤하게 만들다). 논리적인 이유를 대어 상대방의 마음을 완전히 돌려놓는 행위.", cognates: "persuade (설득하다), persuasive (설득력 있는)" },
                { word: "resist", meaning: "반대하다. 대항하다", etymology: "re-(반대하여) + 라틴어 sistere(서 있다). 외부에서 가해지는 힘이나 명령에 굴복하지 않고 버티고 서다.", cognates: "resistance (저항)" },
                { word: "sessional", meaning: "개정 중의, 회기마다의", etymology: "라틴어 sedere(앉다) + ional. 의원들이 의회 의자에 다 함께 앉아 회의를 진행하는 특정 기간(회기)과 관련된.", cognates: "session (기간, 회기)" },
                { word: "lead", meaning: "(군대 등을) 지휘하다", etymology: "고대 게르만어 길을 가다에서 유래. 대원들의 맨 앞에서 방향을 제시하며 조직 전체를 이끌고 나아가다.", cognates: "leader (지도자)" },
                { word: "persuade", meaning: "(설득하여) 납득시키다", etymology: "per-(완전히) + 라틴어 suadere(조언하다). 상대방이 이성적으로 수긍하도록 조리 있게 설명하여 동의를 얻어내다.", cognates: "persuasion (설득)" },
                { word: "argument", meaning: "논쟁", etymology: "라틴어 arguere(명확히 밝히다) + ment. 서로 다른 주장을 가진 주체들이 각자의 정당성을 입증하려 격렬하게 다투는 말.", cognates: "argue (논쟁하다)" },
                { word: "immediately", meaning: "즉시; 직접", etymology: "in-(부정) + 라틴어 mediare(사이에 놓이다) + ly. 중간에 시간적·공간적 매개체를 전혀 두지 않고 곧바로 실행하는.", cognates: "immediate (즉각적인)" },
                { word: "demand", meaning: "고집하다. 주장하다. 요구하다", etymology: "de-(강조) + 라틴어 mandare(명령하다). 권리를 기반으로 상대방에게 강력하게 특정 조치를 내놓으라고 요구함.", cognates: "demanding (요구가 많은)" },
                { word: "instant", meaning: "즉각적인", etymology: "in-(위에) + 라틴어 stare(서 있다). 일의 처리 시점이 바로 내 눈앞에 바짝 도달해 있어 지체할 시간이 없는 찰나의 상태.", cognates: "instantly (즉시)" }
            ],
            21: [
                { word: "influence", meaning: "~에 영향을 미치다", etymology: "in-(안으로) + 라틴어 fluere(흐르다). 에너지가 타인의 내면 안으로 흘러 들어가 변화를 주다.", cognates: "influential (영향력 있는)" },
                { word: "prospective", meaning: "유망한", etymology: "pro-(앞으로) + 라틴어 specere(바라보다). 미래의 앞날을 내다보았을 때 성공이나 발전 가능성이 열려 있는 상태.", cognates: "prospect (전망)" },
                { word: "criterion", meaning: "표준, 기준", etymology: "그리스어 krinein(판단하다, 분별하다) + ion. 어떤 대상의 가치를 올바르게 판정하기 위해 사용하는 절대적 잣대.", cognates: "criteria (복수형)" },
                { word: "simple", meaning: "단순한", etymology: "라틴어 simplus(한 번만 접은, 꼬이지 않은). 복잡하지 않고 구조가 명쾌하여 누구나 쉽게 인지할 수 있는 상태.", cognates: "simplify (단순화하다), simplicity (간결함)" },
                { word: "complicated", meaning: "복잡한", etymology: "com-(함께) + 라틴어 plicare(접다, 꼬다). 여러 개의 가닥이 복잡하게 한데 접히고 뒤엉켜 있어 풀어내기 힘든 양상.", cognates: "complicate (복잡하게 만들다)" },
                { word: "tendency", meaning: "경향", etymology: "라틴어 tendere(뻗다, 향하다) + ency. 어떤 특정 방향이나 행동 양식을 향해 마음이 기우는 성향.", cognates: "tend (~하는 경향이 있다)" },
                { word: "facilitate", meaning: "용이하게 하다", etymology: "라틴어 facilis(쉬운, 행하기 편한). 일을 진행하는 과정의 장애물을 치워주어 수월하게 돌아가도록 돕다.", cognates: "facility (시설)" },
                { word: "standardize", meaning: "표준화하다", etymology: "standard(기준, 깃발) + ize(만들다). 제각각이던 형식을 하나의 일관된 기준에 맞추어 똑같이 정형화하다.", cognates: "standard (표준)" },
                { word: "safe", meaning: "안전한", etymology: "라틴어 salvus(온전한, 다치지 않은). 위험 요소나 위협으로부터 완벽하게 보호받아 상처가 없는 상태.", cognates: "safety (안전)" },
                { word: "condition", meaning: "상황, 환경", etymology: "con-(함께) + 라틴어 dicere(말하다). 사물이 특정 방식으로 존재하기 위해 주변 요소들과 조화를 이루고 있는 상태.", cognates: "conditional (조건부의)" },
                { word: "indicator", meaning: "지시자: 지표", etymology: "in-(안으로) + 라틴어 dicare(선언하다, 가리키다). 눈에 보이지 않는 추세나 상태를 겉으로 가리켜 보여주는 도구.", cognates: "indicate (나타내다)" },
                { word: "organizational", meaning: "조직의", etymology: "organ(기관, 도구) + ize + ational. 공통의 목적을 달성하기 위해 개별 요소를 체계적으로 엮어 만든 집단과 관련된.", cognates: "organize (조직하다)" },
                { word: "freedom", meaning: "자유", etymology: "free(해방된) + dom(상태). 외압이나 타인의 억압 없이 자신의 의지대로 행동할 수 있는 권리 상태.", cognates: "freely (자유롭게)" },
                { word: "security", meaning: "안전, 보안", etymology: "se-(없이) + 라틴어 cura(걱정, 근심). 외부의 위협요소가 완벽히 차단되어 마음에 근심 걱정이 없는 상태.", cognates: "secure (안전한)" },
                { word: "position", meaning: "지위, 신분", etymology: "라틴어 ponere(놓다) + ition. 사회적 구조나 공간 선상에서 내가 약속되어 놓여 있는 명확한 자리.", cognates: "positive (긍정적인)" },
                { word: "have a tendency to", meaning: "~하는 경향이 있다", etymology: "have(가지다) + tendency(성향) + 전치사 to. 특정한 조건이 주어졌을 때 약속된 행동 양식으로 움직이기 쉬운.", cognates: "tendency (경향)" },
                { word: "morality", meaning: "도덕성", etymology: "라틴어 mos(관습, 사회적 행품). 선과 악을 올바르게 구별하고 공동체의 가치 규칙을 준수하려는 내면의 성품.", cognates: "moral (도덕적인), immoral (부도덕한)" },
                { word: "insecure", meaning: "불안정한", etymology: "in-(부정) + secure(안전한). 언제 무너질지 몰라 마음이 위태롭고 외부 위협에 고스란히 노출되어 있는.", cognates: "insecurity (불안정)" },
                { word: "indication", meaning: "암시, 지적", etymology: "in-(안으로) + 라틴어 dicare(말하다). 대놓고 직접 말하지 않고 겉으로 신호를 주어 내면의 의미를 간접적으로 가리킴.", cognates: "indicate (지적하다)" },
                { word: "chance", meaning: "기회", etymology: "라틴어 cadere(떨어지다). 내 노력이 아니라 하늘에서 우연히 내 머리 위로 툭 떨어지듯 찾아온 행운.", cognates: "chancy (위험한)" },
                { word: "advantageous", meaning: "유리한, 이로운", etymology: "프랑스어 avant(앞에) + age + ous. 경쟁자들보다 한 걸음 더 앞선 위치를 차지하여 이익을 얻기 수월한.", cognates: "advantage (이점)" },
                { word: "adequate", meaning: "적당한", etymology: "ad-(~에) + 라틴어 aequus(평평한, 동등한). 요구되는 기준에 과부족 없이 평평하게 수평을 맞춘 상태.", cognates: "adequacy (적절성)" },
                { word: "immoral", meaning: "부도덕한", etymology: "in-(부정) + moral(도덕적인). 공동체가 합의한 양심적 규칙과 선한 도덕 기준을 정면으로 위반하여 행동하는.", cognates: "morality (도덕성)" },
                { word: "racial stereotypes", meaning: "인종적 고정 관념", etymology: "racial(인종의) + stereotype(고정 활자판). 특정 인종 집단 전체가 다 똑같을 것이라고 틀을 박아버린 생각.", cognates: "race (인종)" },
                { word: "get", meaning: "얻다, 습득하다", etymology: "고대 게르만어 getan(움켜쥐다). 노력이나 상호작용을 통해 무언가를 내 소유로 획득하는 행위.", cognates: "getter (획득자)" },
                { word: "disadvantage", meaning: "불이익", etymology: "dis-(부정) + advantage(유리함). 경쟁선상에서 남들보다 뒤처지거나 손해를 보게 만드는 부정적인 조건.", cognates: "advantageous (유리한)" },
                { word: "inadequacy", meaning: "불충분, 결점", etymology: "in-(부정) + adequacy(적절함). 요구되는 기준에 도달하지 못하여 발생한 모자람이나 결함 상태.", cognates: "adequate (적절한)" },
                { word: "acquired", meaning: "후천적인", etymology: "ad-(~로) + 라틴어 quaerere(추구하다). 태어날 때부터 가진 것이 아니라, 살아가면서 환경을 통해 획득한.", cognates: "acquire (습득하다)" },
                { word: "allowance", meaning: "승인: 용돈", etymology: "allow(허락하다) + ance. 부모나 상위 주체가 특정 지출을 허용하여 정기적으로 나누어주는 정해진 돈.", cognates: "allow (허락하다)" },
                { word: "golden opportunity", meaning: "절호의 기회", etymology: "golden(황금빛의, 소중한) + opportunity(기회). 엄청난 이익을 가져다줄 최고의 귀한 순간.", cognates: "opportune (적절한 시기의)" },
                { word: "end", meaning: "만기가 되다", etymology: "고대 영어 ende(끝, 한계). 정해진 시간의 경계선 맨 끝 지점에 도달하여 효력이 소멸해 종료되다.", cognates: "endless (끝없는)" },
                { word: "socialize", meaning: "사회화하다", etymology: "라틴어 socius(동료, 친구) + ize. 인간이 공동체의 일원으로서 올바르게 살아갈 수 있도록 문화를 학습시키는 과정.", cognates: "society (사회), social (사회적인)" },
                { word: "improper", meaning: "부적절한", etymology: "in-(부정) + proper(알맞은). 예의범절이나 정해진 상황 윤리에 어긋나서 타인에게 불편함을 주는 행위.", cognates: "properly (제대로)" },
                { word: "society", meaning: "사회", etymology: "라틴어 socius(동료, 무리) + ety. 공통의 문화, 제도, 가치관을 공유하며 상호작용하는 인간들의 집합체.", cognates: "social (사회적인)" },
                { word: "charitable", meaning: "자비로운", etymology: "라틴어 caritas(대가 없는 사랑). 소외된 타인을 불쌍히 여겨 온정을 베풀고 구제하는 성품의.", cognates: "charity (자선단체)" },
                { word: "voluntary", meaning: "자발적인", etymology: "라틴어 voluntas(자유 의지). 외부의 강요 없이, 오직 자신의 의지에 따라 스스로 행동하는.", cognates: "volunteer (자원봉사자)" },
                { word: "ethical", meaning: "윤리의", etymology: "그리스어 ethos(사회적 관습, 도덕적 기질). 마땅히 지켜야 할 올바른 행실과 가치 판단의 기준 관련.", cognates: "ethics (윤리학)" },
                { word: "leisure complex", meaning: "종합 레저 건물", etymology: "leisure(여가) + complex(복합체). 시민들이 휴식과 운동, 취미를 한 공간에서 즐기도록 설계된 복합 건축물.", cognates: "complex (복합의)" },
                { word: "expiration", meaning: "종료, 만기", etymology: "ex-(밖으로) + 라틴어 spirare(숨을 쉬다). 숨이 완전히 다 빠져나가 생명이나 계약 효력이 끝남.", cognates: "expire (만료되다)" },
                { word: "organize", meaning: "조직하다", etymology: "그리스어 organon(도구, 신체 기관). 제각각 흩어져 있던 요소들을 목적 달성을 위해 체계로 엮다.", cognates: "organization (조직)" },
                { word: "ethics", meaning: "윤리학", etymology: "그리스어 ethos(도덕적 품성) + ics. 무엇이 도덕적으로 옳고 그른지 인간 행동의 원리를 연구하는 학문.", cognates: "ethical (윤리적인)" },
                { word: "acquisition", meaning: "습득", etymology: "ad-(~로) + 라틴어 quaerere(구하다) + ition. 정당한 훈련 과정을 거쳐 무언가를 내 것으로 받아들이는 일.", cognates: "acquire (획득하다)" }
            ],
            22: [
                { word: "innocent", meaning: "무고한", etymology: "in-(부정) + 라틴어 nocere(해를 끼치다). 타인에게 상처를 주지 않아 죄가 없고 깨끗한 상태.", cognates: "innocence (무죄, 순수함)" },
                { word: "arrestment", meaning: "체포", etymology: "ad-(~에) + 라틴어 restare(멈춰 서다). 피의자의 신체적 자유를 박탈하여 도망치지 못하게 붙잡아 둠.", cognates: "arrest (체포하다)" },
                { word: "evidently", meaning: "명백히", etymology: "ex-(밖으로) + 라틴어 videre(보다). 숨기거나 추측할 필요 없이 눈앞에 뚜렷하게 드러나 보이는 양상으로.", cognates: "evident (명백한), evidence (증거)" },
                { word: "restrictive", meaning: "제한하는", etymology: "re-(뒤로) + 라틴어 stringere(팽팽하게 묶다). 권리의 범위를 끈으로 묶어 일정 선 이상 넘지 못하게 막는.", cognates: "restrict (제한하다), restriction (규제)" },
                { word: "deliberate", meaning: "의도적인, 계획된", etymology: "de-(강조) + 라틴어 libra(저울). 저울 위에 물건을 올려놓고 재듯, 마음속으로 깊이 생각하고 실행한.", cognates: "deliberated (심사숙고된)" },
                { word: "guilt", meaning: "유죄", etymology: "고대 영어 gylt(범죄). 규범을 위반하여 책임을 지고 처벌을 받아야 하는 상태.", cognates: "guilty (유죄의)" },
                { word: "robbery", meaning: "강도질, 강탈", etymology: "고대 게르만어 전리품을 챙기다에서 유래. 폭력이나 위협을 수단으로 재물을 억지로 빼앗는 범죄 행위.", cognates: "rob (강탈하다), robber (강도)" },
                { word: "offender", meaning: "범인, 범죄자", etymology: "ob-(~에 맞서) + 라틴어 fendere(치다). 타인의 권리나 사회 규칙 경계선을 강하게 깨부수고 침범한 범죄 주체.", cognates: "offend (위반하다)" },
                { word: "investigation", meaning: "조사", etymology: "in-(안으로) + 라틴어 vestigare(발자국을 추적하다). 진실을 밝히기 위해 흔적을 끝까지 뒤쫓는 과정.", cognates: "investigate (조사하다), investigator (수사관)" },
                { word: "conviction", meaning: "유죄 선고, 확신", etymology: "con-(완전히) + 라틴어 vincere(이기다). 법정 다툼에서 완벽하게 승리하여 죄가 있음을 법적으로 판정함.", cognates: "convict (유죄를 선고하다)" },
                { word: "break", meaning: "위반하다", etymology: "고대 영어 brecan(부수다). 사회 구성원들이 지키기로 약속한 신성한 법이나 계약을 깨부수다.", cognates: "breakable (깨지기 쉬운)" },
                { word: "admission", meaning: "인정", etymology: "ad-(~로) + 라틴어 mittere(보내다). 자신이 행한 잘못이나 사실을 숨기지 않고 안으로 받아들이는 행위.", cognates: "admit (인정하다)" },
                { word: "prohibit", meaning: "금하다", etymology: "pro-(앞에) + 라틴어 habere(쥐다, 보유하다). 상대방이 어떤 행동을 하지 못하도록 앞서 서서 막아서다.", cognates: "prohibition (금지)" },
                { word: "control", meaning: "규제하다. 통제하다", etymology: "contra(맞서서) + rotulus(회전 장부). 대조 장부를 활용하여 시스템을 내 뜻대로 움직이다.", cognates: "controller (관리자)" },
                { word: "obvious, plain", meaning: "분명한, 명백한", etymology: "obvious는 길 바로 앞에 있어 한눈에 보이는. plain은 평평하여 가리는 매개물이 없어 명확한.", cognates: "obviously (분명히)" },
                { word: "stop", meaning: "막다. ~하지 못하게 하다", etymology: "라틴어 구멍을 천으로 메우다. 흐르던 물줄기나 행동 흐름을 쾅 막아 전진하지 못하게 제어함.", cognates: "stoppage (중단)" },
                { word: "deceptive", meaning: "속이는", etymology: "de-(아래로) + 라틴어 capere(배반하다/잡다). 타인을 덫 아래로 유인하여 손해를 입히려는 의도의.", cognates: "deceive (속이다), deception (기만)" },
                { word: "permit", meaning: "허가하다", etymology: "per-(통과하여) + 라틴어 mittere(보내다). 규제 구역 경계선 너머로 자유롭게 지나갈 수 있도록 허락하다.", cognates: "permission (허가)" },
                { word: "accidental", meaning: "우연한", etymology: "ad-(~에게) + 라틴어 cadere(떨어지다). 계획에 전혀 없던 돌발 상황이 머리 위로 툭 떨어지듯 발생한.", cognates: "accident (사고), accidentally (우연히)" },
                { word: "rob", meaning: "강탈하다", etymology: "고대 게르만어 의복이나 자산을 강제로 찢어 빼앗다에서 유래. 폭력을 수단으로 재산을 빼앗다.", cognates: "robber (강도)" },
                { word: "investigator", meaning: "수사관", etymology: "in-(안으로) + 라틴어 vestigare(추적하다) + or. 사건 현장에 남겨진 단서와 흔적을 정밀하게 뒤쫓는 사람.", cognates: "investigate (수사하다)" },
                { word: "suspicion", meaning: "의심, 혐의", etymology: "sub-(아래에서) + 라틴어 specere(바라보다). 겉으로는 믿는 척하지만 저변 아래에서는 진짜 범인이 아닐까 봄.", cognates: "suspect (의심하다)" },
                { word: "commit suicide", meaning: "자살하다", etymology: "commit(범죄를 자행하다) + suicide(sui-자신을 + cide-죽이다). 스스로 자신의 생명을 끊는 행위.", cognates: "suicidal (자살 충동의)" },
                { word: "cheat", meaning: "속이다. 기만하다", etymology: "과거 가문에 상속자가 없어 재산이 국가로 귀속되던 일에서 유래. 사기치고 속임수를 쓰는 행위.", cognates: "cheater (사기꾼)" },
                { word: "deception", meaning: "속임, 기만, 거짓", etymology: "de-(아래로) + 라틴어 capere(붙잡다). 진실을 교묘하게 가리고 거짓을 보여주어 타인을 오도하는 행위.", cognates: "deceive (기만하다)" },
                { word: "regulation", meaning: "규제", etymology: "라틴어 regulae(직선 잣대, 규칙). 무질서하게 돌아가는 시스템을 올바른 선 안으로 통제하는 규칙.", cognates: "regulate (규제하다)" },
                { word: "violation", meaning: "위반", etymology: "라틴어 violare(폭력을 행사하다). 신성한 법령이나 타인의 권리 테두리를 짓밟아 깨부수다.", cognates: "violate (위반하다)" },
                { word: "identification", meaning: "신원 확인, 신분증", etymology: "라틴어 idem(똑같은 것) + facere. 눈앞의 인물이 장부에 적힌 진짜 본인과 동일한 존재인지 확인하는 일.", cognates: "identify (확인하다), identity (정체성)" },
                { word: "suspicious", meaning: "의심스러운", etymology: "sub-(아래에서) + 라틴어 specere(쳐다보다). 명확한 물증은 없으나 정황상 뒤가 구리고 수상쩍은 가득한.", cognates: "suspect (의심하다)" },
                { word: "criminal", meaning: "유죄의", etymology: "그리스어 krima(법적 기소, 판단). 사회의 안전망 규칙을 위반하여 정식으로 유죄 판결을 받은.", cognates: "crime (범죄)" },
                { word: "confession", meaning: "자백", etymology: "con-(완전히) + 라틴어 fateri(인정하다). 마음속 깊이 숨겨두었던 자신의 범죄 사실을 스스로 털어놓음.", cognates: "confess (자백하다)" },
                { word: "deny", meaning: "부인하다", etymology: "de-(강조) + 라틴어 negare(아니다라고 말하다). 제기된 의혹이나 내용이 사실이 아니라고 거부함.", cognates: "denial (부인)" },
                { word: "inquiry", meaning: "질문, 조사", etymology: "in-(안으로) + 라틴어 quaerere(캐묻다). 사건의 내막 진실을 파헤치기 위해 질문을 던져 답을 구함.", cognates: "inquire (문의하다)" },
                { word: "investigate", meaning: "조사하다", etymology: "in-(안으로) + 라틴어 vestigare(흔적을 밟다). 범죄 사건의 실체를 밝히기 위해 증거품을 추적하다.", cognates: "investigation (수사)" },
                { word: "forbidden", meaning: "금지된", etymology: "for-(금지) + 고대 영어 biddan(명령하다). 상위 권력이나 법령에 의해 특정 행동을 하지 말라고 봉쇄된.", cognates: "forbid (금지하다)" },
                { word: "capture", meaning: "(덫으로) 잡다", etymology: "라틴어 capere(손으로 움켜쥐다). 도망치려는 대상을 무기를 활용하거나 덫에 걸리게 하여 생포함.", cognates: "captive (포로)" },
                { word: "restriction", meaning: "제한", etymology: "re-(뒤로) + 라틴어 stringere(묶다). 자유롭게 움직이지 못하도록 행동의 반경 경계를 제어하는 조치.", cognates: "restrict (한정하다)" },
                { word: "prevention", meaning: "방지", etymology: "prae-(미리, 앞서서) + 라틴어 venire(오다). 불행한 사고가 터지기 전에 미리 앞서 와서 길목을 차단함.", cognates: "prevent (예방하다)" },
                { word: "limit", meaning: "제한하다", etymology: "라틴어 limes(경계선). 더 이상 바깥으로 나아가지 못하도록 보이지 않는 한계선 장벽을 그어 통제하다.", cognates: "limitation (한계)" },
                { word: "offensive", meaning: "무례한", etymology: "ob-(~에 맞서) + 라틴어 fendere(치다). 예의범절 경계선을 세차게 들이받아 깊은 모욕감을 주는.", cognates: "offend (불쾌하게 하다)" },
                { word: "sentence", meaning: "유죄를 선고하다", etymology: "라틴어 sentire(마음속 깊이 판단하다). 판사가 심사한 뒤 공식적인 처벌 형량을 판결하여 내리다.", cognates: "sentence (문장)" },
                { word: "intentionally", meaning: "고의로", etymology: "in-(안으로) + 라틴어 tendere(마음을 뻗다). 처음부터 목표를 향해 명확한 마음의 화살을 당겨 실행한.", cognates: "intention (의도)" },
                { word: "appealing", meaning: "호소하는, 매력 있는", etymology: "ad-(~로) + 라틴어 pellere(밀어붙이다). 타인의 감정이나 마음의 문을 세차게 두드려 매력을 이끌어내는.", cognates: "appeal (호소)" },
                { word: "evidence", meaning: "증거", etymology: "ex-(밖으로) + 라틴어 videre(명확히 보다). 어떤 주장의 사실 여부를 대중 앞에 명백하게 입증하여 보여줄 구체적 물증.", cognates: "evident (명백한)" },
                { word: "intention", meaning: "의도, 목적", etymology: "in-(안으로) + 라틴어 tendere(마음을 당기다). 행동을 개시하기 전 머릿속으로 특정 과녁을 향해 겨냥하고 있는 목적관.", cognates: "intend (의도하다)" }
            ]
        };

        let currentDay = 20;
        let currentMode = 'list';
        let cardIndex = 0;

        function switchDay(day) {
            currentDay = day;
            cardIndex = 0; 
            
            const cardInner = document.getElementById('card-inner');
            if (cardInner) cardInner.classList.remove('card-flipped');
            
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('bg-indigo-600', 'text-white', 'shadow-sm');
                btn.classList.add('bg-slate-100', 'text-slate-600');
            });
            const activeTab = document.getElementById(`tab-${day}`);
            activeTab.classList.remove('bg-slate-100', 'text-slate-600');
            activeTab.classList.add('bg-indigo-600', 'text-white', 'shadow-sm');

            renderContent();
        }

        function switchMode(mode) {
            currentMode = mode;
            cardIndex = 0; 
            const listBtn = document.getElementById('mode-list');
            const cardBtn = document.getElementById('mode-card');
            const footerList = document.getElementById('footer-list-mode');
            const footerCard = document.getElementById('footer-card-mode');

            if(mode === 'list') {
                listBtn.className = "px-3 py-1.5 rounded-full bg-slate-800 text-white shadow";
                cardBtn.className = "px-3 py-1.5 rounded-full bg-slate-200 text-slate-700";
                
                footerList.classList.remove('hidden');
                footerCard.classList.add('hidden');
            } else {
                cardBtn.className = "px-3 py-1.5 rounded-full bg-slate-800 text-white shadow";
                listBtn.className = "px-3 py-1.5 rounded-full bg-slate-200 text-slate-700";
                
                footerList.classList.add('hidden');
                footerCard.classList.remove('hidden');
            }
            renderContent();
        }

        function renderContent() {
            const container = document.getElementById('vocab-container');
            const progressText = document.getElementById('card-progress');
            const btnPrev = document.getElementById('btn-prev');
            const btnNext = document.getElementById('btn-next');
            const data = vocabData[currentDay];

            if (currentMode === 'list') {
                container.innerHTML = data.map((item, idx) => `
                    <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 shadow-sm">
                        <div class="flex justify-between items-start">
                            <span class="text-xs text-indigo-500 font-bold uppercase tracking-wider">No. ${idx + 1}</span>
                            <span class="text-xl font-bold text-slate-800">${item.word}</span>
                        </div>
                        <div class="mt-2 text-sm font-medium text-slate-600 border-t border-slate-200/60 pt-2">
                            <span class="text-indigo-600">뜻:</span> ${item.meaning}
                        </div>
                        <div class="mt-2 text-xs text-slate-500 bg-white p-2 rounded border border-slate-100">
                            <strong class="text-amber-600">💡 어원:</strong> ${item.etymology}
                        </div>
                        <div class="mt-1 text-xs text-slate-500 bg-white p-2 rounded border border-slate-100">
                            <strong class="text-emerald-600">🌿 동계어:</strong> ${item.cognates}
                        </div>
                    </div>
                `).join('');
            } else {
                const item = data[cardIndex];
                
                progressText.innerText = `${cardIndex + 1} / ${data.length}`;
                
                if(cardIndex === 0) btnPrev.classList.add('opacity-50', 'pointer-events-none');
                else btnPrev.classList.remove('opacity-50', 'pointer-events-none');
                
                if(cardIndex === data.length - 1) btnNext.classList.add('opacity-50', 'pointer-events-none');
                else btnNext.classList.remove('opacity-50', 'pointer-events-none');
                
                container.innerHTML = `
                    <div class="text-center text-xs text-slate-400 mb-2">💡 카드를 터치하면 뜻과 어원이 나타납니다.</div>
                    <div class="card-flip w-full h-80 cursor-pointer" onclick="flipCard()">
                        <div id="card-inner" class="card-inner w-full h-full relative rounded-2xl shadow-lg border border-slate-200">
                            <div class="card-front absolute w-full h-full bg-indigo-50 flex flex-col justify-center items-center rounded-2xl p-6">
                                <span class="text-xs text-indigo-400 font-bold tracking-widest mb-4">WORD</span>
                                <h2 class="text-3xl font-extrabold text-indigo-700 tracking-tight">${item.word}</h2>
                            </div>
                            <div class="card-back absolute w-full h-full bg-white flex flex-col justify-between rounded-2xl p-6 overflow-y-auto">
                                <div>
                                    <span class="text-xs text-emerald-500 font-bold tracking-widest block mb-2">MEANING</span>
                                    <h3 class="text-xl font-bold text-slate-800 border-b pb-2 border-slate-100">${item.meaning}</h3>
                                </div>
                                <div class="my-3 text-left space-y-2">
                                    <p class="text-xs text-slate-600"><strong class="text-amber-600 block mb-0.5">💡 어원</strong> ${item.etymology}</p>
                                    <p class="text-xs text-slate-600"><strong class="text-emerald-600 block mb-0.5">🌿 동계어</strong> ${item.cognates}</p>
                                </div>
                                <span class="text-[10px] text-slate-300">다시 터치하면 앞면으로 돌아갑니다.</span>
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        function flipCard() {
            document.getElementById('card-inner').classList.toggle('card-flipped');
        }

        function nextCard() {
            if (cardIndex < vocabData[currentDay].length - 1) {
                cardIndex++;
                renderContent();
            }
        }

        function prevCard() {
            if (cardIndex > 0) {
                cardIndex--;
                renderContent();
            }
        }

        // Initialize App with Day 20
        switchDay(20);
    </script>
</body>
</html>
