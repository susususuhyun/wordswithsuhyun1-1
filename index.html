      { id: 1, word: "hold [own] a copyright", meaning: "저작권을 소유하다", prefix: "copy (사본) + right (권리)", root: "copyright", story: "자신이 창조한 원본 예술품이나 글을 타인이 똑같이 베껴 복사해 갈 수 있는(copy) 합법적인 정당한 권리(right)를 손에 꼭 쥐고(hold) 있다는 뜻입니다.", related: "copy (복사하다), copycat (모방자), right (올바른, 권리)" },
      { id: 2, word: "imitation", meaning: "모방, 모조", prefix: "im- (안으로, 흉내내다)", root: "imitari (라틴어: 모방하다)", story: "동경하는 우상이나 훌륭한 그림의 형태를 마음속 깊이 품어 안고(im-) 그것을 가죽이나 캔버스 위에 그대로 행동으로 따라 하는 '모방'입니다.", related: "imitate (모방하다), inimitable (아무나 모방할 수 없는), image (초상, 그림)" },

      { id: 4, word: "stand in line", meaning: "줄을 서다", prefix: "stand (서다)", root: "line (라틴어: linu - 실)", story: "마치 실타래에서 길게 뽑아낸 팽팽한 실줄기(line)의 흐름을 어지럽히지 않고 그 일직선 안(in)에 정중히 차례대로 서서(stand) 차례를 기다리는 행동입니다.", related: "standard (기준, 표준), linear (선형의), alignment (정렬)" },
      { id: 5, word: "craftsman", meaning: "장인, 숙련공", prefix: "craft (기술, 힘)", root: "man (사람)", story: "기계 공장이 존재하지 않던 시절, 숙련된 손기술과 고유한 지혜(craft)를 바탕으로 물건을 완벽하게 깎아내는 '손재주 장인'입니다.", related: "crafty (교활한, 기교 있는), handcraft (수공예), witchcraft (마법)" },

      { id: 8, word: "composer", meaning: "작곡가", prefix: "com- (함께)", root: "ponere (라틴어: 놓다, 배치하다) + -er", story: "머릿속에서 웅웅대는 수많은 아름다운 악상과 멜로디의 가락들을 오선지 위에 한데 모아 정돈되게 올려놓는(com- + pose) 사람입니다.", related: "compose (작곡하다, 조립하다), composition (작성, 구성), component (구성 부품)" },
      { id: 9, word: "departure", meaning: "출발", prefix: "de- (멀리)", root: "partire (라틴어: 나누다, 헤어지다)", story: "지금껏 정들었던 안락한 고향의 든든한 경계선에서 내 몸을 떼어내어 분리하고(part) 저 너머 미지의 해외로 가고자 나서는 일입니다.", related: "depart (출발하다), part (부분), department (나뉜 부서), partial (부분적인)" },
      { id: 10, word: "baggage claim", meaning: "(공항의) 수하물 찾는 곳", prefix: "baggage (여행 짐) + claim (소리치다)", root: "clamare (라틴어: 외치다)", story: "공항 레일에 실려 나오는 가방들을 보고 \"저 가방은 저의 귀중한 짐이 맞습니다!\"라고 큰 소리로 권리를 소리쳐(claim) 찾아가는 수하물 인도장입니다.", related: "baggage (수하물), claim (주장하다, 권리를 외치다), exclaim (외치다), proclaim (선포하다)" },
      { id: 11, word: "individual", meaning: "별개의", prefix: "in- (아닌)", root: "dividuus (라틴어: 쪼갤 수 있는)", story: "만약 여기서 더 자르거나 나눈다면 그 본연의 아름다운 개성과 본질이 영영 깨지고 부서져 버리는 독립적이고 '별개의' 유일한 생명체입니다.", related: "divide (나누다), division (부서, 분열), dividend (배당금)" },
      { id: 12, word: "nobility", meaning: "고귀함; 귀족", prefix: "gno- (널리 알려진)", root: "nobilis (라틴어: 이름 높은, 유명한)", story: "그가 베푼 성스럽고 훌륭한 선행이나 뛰어난 명성이 온 세상 사람들 입을 통해 '널리 소문나 있어' 품격 있는 고귀한 신분입니다.", related: "noble (고귀한), ignoble (천한, 비열한), ignore (무시하다)" },
      { id: 13, word: "melody", meaning: "곡조, 가락", prefix: "melos (그리스어: 노래 가락)", root: "aeidein (그리스어: 노래하다)", story: "축제의 밤에 감미로운 비파 소리와 시적인 구절(melos)에 어울리도록 조화롭게 흥얼거리며 부르는 달콤한 가창 '곡조, 가락'입니다.", related: "melodic (선율이 고운), melodrama (멜로드라마), tragedy (비극 - 염소의 노래)" },
      { id: 14, word: "directorial", meaning: "감독의", prefix: "di- (완전히)", root: "regere (라틴어: 바르게 지도하다) + -ial", story: "한 무리의 연기자들이 어설프게 갈팡질팡 흩어지지 않게 올바른 선의 규칙대로 곧게 정렬해 이끄는 '영화/연극 감독의' 역할입니다.", related: "director (감독), direct (지시하다, 연출하다), direction (방향), reign (지배하다)" },
      { id: 15, word: "in use", meaning: "사용되고 있는", prefix: "in (~상태인) + use (사용)", root: "uti (라틴어: 사용하다)", story: "창고 선반 구석에 먼지가 뿌옇게 쌓여 외면받지 않고, 지금 누군가의 바쁜 손에 쥐여 활발히 그 기능을 수행하고 있는 상태입니다.", related: "useful (유용한), abuse (남용하다, 오용하다), utility (유용성, 공공 요금)" },
      { id: 16, word: "direct", meaning: "연출하다", prefix: "di- (완전히)", root: "regere (라틴어: 곧게 뻗어 나가다)", story: "중간에 어떤 장애물이나 꼬임 없이, 목표지점이나 연기자를 향해 자를 대고 일직선으로 곧게 뻗어 나가며 진두지휘하는 행위입니다.", related: "indirect (간접적인), director (감독), rectangle (직사각형), regular (규칙적인)" },
      { id: 17, word: "display", meaning: "전시하다, 전시회를 열다", prefix: "dis- (반대로, 풀어내어)", root: "plicare (라틴어: 접다)", story: "상자 속에 겹겹이 고이 접어서(fold) 안 보이게 꼭꼭 숨겨두었던 귀한 신상 드레스를 반대로 활짝 펼쳐서(unfold) 남들에게 자랑하는 일입니다.", related: "complicate (복잡하게 하다 - 여러 번 접다), imply (암시하다), employ (고용하다)" },
      { id: 18, word: "different", meaning: "다른", prefix: "dis- (사방으로, 따로)", root: "ferre (라틴어: 가져가다, 실어 나르다)", story: "같은 곳에 수동적으로 뭉쳐 있지 않고, 각자 자신의 의견과 목적지를 사방으로 따로 멀리 실어 날라 가기에 서로 완전히 '다른' 성격입니다.", related: "differ (다르다), infer (추론하다), prefer (선호하다), transfer (이동하다)" },
      { id: 19, word: "tragic", meaning: "비극의, 비극적인", prefix: "tragos (그리스어: 염소)", root: "oide (그리스어: 노래, 연극)", story: "고대 그리스 연극 축제에서 올림포스 신들에게 제물로 바쳐질 무고한 염소(tragos)를 단상에 끌고 올라 부르던 구슬픈 눈물의 연극입니다.", related: "tragedy (비극), comedy (희극), lyric (서정시)" },
      { id: 20, word: "location", meaning: "위치", prefix: "loc- (장소)", root: "locare (라틴어: 자리를 배치하다)", story: "광활한 대륙의 면적 중 내가 안락한 오두막집을 세우거나 텐트를 치기에 가장 살기 좋고 알맞다고 찍어둔 안전한 '장소'입니다.", related: "local (지방의, 현지의), locate (위치시키다), allocate (나누어 할당하다)" },
      { id: 21, word: "subway", meaning: "(美) 지하철", prefix: "sub- (아래에)", root: "way (길)", story: "소음과 자동차 연기가 가득한 도심 빌딩 숲 지상 도로를 피하여 튼튼한 콘크리트 땅 밑아래(sub)로 길을 내어 열차가 쌩쌩 달리게 만든 전철입니다.", related: "subzero (영하), submerge (물에 잠기다), highway (고속도로)" },
      { id: 22, word: "sound", meaning: "음색, 음조", prefix: "sonus (소리)", root: "sonus (라틴어: 소리)", story: "물체가 외부 충격을 받아 공기를 튕겨내며 귓가에 맑게 전해지는 떨림의 파장이며, 더 나아가 흠이 없고 튼튼하며 '건강한' 의미로도 쓰입니다.", related: "sonic (음속의), sonata (소나타), resonance (공명, 울림), soundly (깊게, 건강하게)" },
      { id: 23, word: "conveyance", meaning: "운반, 탈것", prefix: "con- (함께)", root: "via (라틴어: 길)", story: "외로운 나그네와 그의 커다란 보따리 짐을 한마차에 함께(con) 올린 후 다치지 않게 목적지 길(via)을 따라 실어 나르는 수단입니다.", related: "convey (운반하다), convoy (호송하다), obvious (길가에 있어 명백한), devious (우회하는)" },
      { id: 24, word: "conductor", meaning: "지휘자", prefix: "con- (함께)", root: "ducere (라틴어: 이끌다, 안내하다) + -or", story: "바이올린, 플루트 등 각기 다른 악기 연주자들의 템포를 한뜻으로 함께(con) 모아 앞으로 씩씩하게 영도해 주는 음악의 '지휘자'입니다.", related: "conduct (행동하다, 지배하다), introduce (소개하다), produce (생산하다), deduce (추론하다)" },
      { id: 25, word: "rehearsal", meaning: "예행연습", prefix: "re- (다시)", root: "hercer (고대 프랑스어: 써레질하여 흙을 고르다)", story: "씨앗을 뿌려 농사짓기 전 흙더미를 여러 번 다시 갈아엎고 고르게 펴는 것처럼, 실전 무대에 오르기 전 연습을 반복하는 과정입니다.", related: "rehearse (예행연습을 하다), hearse (영구차 - 뾰족한 장식 모양에서 유래)" },
      { id: 26, word: "contextual", meaning: "문맥의", prefix: "con- (함께)", root: "texere (라틴어: 옷감을 짜다) + -ual", story: "한 올의 실들이 서로 정교하게 씨줄과 날줄로 어우러져 한 장의 비단 옷(text)을 완성하듯, 단어와 단어가 유기적으로 얽힌 문장의 상황입니다.", related: "context (문맥, 맥락), text (교과서, 글), textile (직물, 직포), texture (질감)" },
      { id: 27, word: "sculptor", meaning: "조각가", prefix: "sculp- (라틴어: 파다, 새기다)", root: "sculpere (조각하다)", story: "그저 투박하게 서 있는 단단한 대리석 덩어리를 날카로운 정과 조각칼로 정밀하게 깎아내 생생한 조각품으로 탈바꿈하는 '조각 예술가'입니다.", related: "sculpture (조각, 조각품), scalp (두피 - 칼로 깎은 껍질)" },
      { id: 28, word: "make up", meaning: "구성하다", prefix: "make (만들다) + up (완전히, 가득히)", root: "makeup", story: "각기 다른 재료나 인물들을 정성껏 모아 빈구석이 전혀 없이 가득 채워서(up) 하나의 완벽한 틀로 형태를 잡아 창조해 내는 행위입니다.", related: "make (만들다), up (위로), maker (제조업자), making (형성)" },
      { id: 29, word: "traditional", meaning: "전통적인", prefix: "trans- (강 건너 저편으로)", root: "dare (라틴어: 건네주다) + -al", story: "조상 대대로 일구어낸 아름다운 예절과 가치 있는 지식들을 세월과 세대의 강 건너로 소중히 물려주어 '전통적으로 이어진' 모습입니다.", related: "tradition (전통), traitor (반역자 - 정보를 적에게 건네준 이), render (전달하다, 주다)" },
      { id: 30, word: "start", meaning: "출발하다", prefix: "start (깜짝 놀라 뛰다)", root: "sterten (중세 영어: 갑자기 뛰다)", story: "가만히 정지해 서 있다가 달리기 신호 총소리에 가슴이 덜컥하여 깜짝 놀라 단숨에 전방을 향해 펄쩍 뛰어나가기 시작하는 모양입니다.", related: "startle (깜짝 놀라게 하다), starting point (출발점)" },

    function App() {
      const [currentIndex, setCurrentIndex] = useState(0);
      const [searchQuery, setSearchQuery] = useState("");
      const [bookmarked, setBookmarked] = useState(new Set());
      const [memorized, setMemorized] = useState(new Set());
      const [showMeaning, setShowMeaning] = useState(true);
      const [filterMode, setFilterMode] = useState("all"); // "all", "bookmarked", "not_memorized"
      const [isPlaying, setIsPlaying] = useState(false);
      const [speechRate, setSpeechRate] = useState(0.9);
      const autoPlayTimer = useRef(null);

      // Web Speech API wrapper
      const playPronunciation = (text) => {
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel();
          // Remove bracket explanations for better TTS pronunciation
          const cleanText = text.replace(/\[.*?\]/g, '').replace(/\(.*?\)/g, '').trim();
          const utterance = new SpeechSynthesisUtterance(cleanText);
          utterance.lang = 'en-US';
          utterance.rate = speechRate;
          window.speechSynthesis.speak(utterance);
        }
      };

      // Speak Korean meaning
      const playMeaning = (text) => {
        if ('speechSynthesis' in window) {
          const cleanText = text.replace(/[\(\)·\[\]~美]/g, '');
          const utterance = new SpeechSynthesisUtterance(cleanText);
          utterance.lang = 'ko-KR';
          utterance.rate = 1.0;
          window.speechSynthesis.speak(utterance);
        }
      };

      // Hotkeys for navigation
      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.key === "ArrowRight") {
            handleNext();
          } else if (e.key === "ArrowLeft") {
            handlePrev();
          } else if (e.key === " ") { // Spacebar to flip
            e.preventDefault();
            setShowMeaning(prev => !prev);
          }
        };
        window.addEventListener("keydown", handleKeyDown);
        return () => window.removeEventListener("keydown", handleKeyDown);
      }, [currentIndex, filterMode, searchQuery]);

      // Filtered words listing logic
      const filteredWords = useMemo(() => {
        return WORDS_DATABASE.filter(item => {
          // Search filter
          const matchesSearch = item.word.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                item.meaning.includes(searchQuery) ||
                                (item.related && item.related.toLowerCase().includes(searchQuery.toLowerCase()));
          
          if (!matchesSearch) return false;

          // Mode filter
          if (filterMode === "bookmarked") {
            return bookmarked.has(item.id);
          } else if (filterMode === "not_memorized") {
            return !memorized.has(item.id);
          }
          return true;
        });
      }, [searchQuery, filterMode, bookmarked, memorized]);

      // Handle pointer adjustments when index out of bounds
      const currentWord = filteredWords[currentIndex] || filteredWords[0] || null;

      const handleNext = () => {
        if (filteredWords.length === 0) return;
        setCurrentIndex(prev => (prev + 1) % filteredWords.length);
        setShowMeaning(true);
      };

      const handlePrev = () => {
        if (filteredWords.length === 0) return;
        setCurrentIndex(prev => (prev - 1 + filteredWords.length) % filteredWords.length);
        setShowMeaning(true);
      };

      // Play continuous reading mode
      useEffect(() => {
        if (isPlaying && currentWord) {
          playPronunciation(currentWord.word);
          
          autoPlayTimer.current = setTimeout(() => {
            if (showMeaning) {
              playMeaning(currentWord.meaning);
            }
            autoPlayTimer.current = setTimeout(() => {
              handleNext();
            }, 3500);
          }, 2000);
        }
        return () => {
          if (autoPlayTimer.current) clearTimeout(autoPlayTimer.current);
        };
      }, [isPlaying, currentIndex, currentWord]);

      // Toggle star bookmark
      const toggleBookmark = (id) => {
        setBookmarked(prev => {
          const next = new Set(prev);
          if (next.has(id)) next.delete(id);
          else next.add(id);
          return next;
        });
      };

      // Toggle memorization status
      const toggleMemorized = (id) => {
        setMemorized(prev => {
          const next = new Set(prev);
          if (next.has(id)) next.delete(id);
          else next.add(id);
          return next;
        });
      };

      return (
        <div class="h-screen flex flex-col md:flex-row bg-slate-950 text-slate-100">
          
          {/* LEFT SIDEBAR: Index of 61 words */}
          <div class="w-full h-[42vh] md:h-auto md:w-80 flex-shrink-0 flex flex-col border-b md:border-b-0 md:border-r border-slate-800 bg-slate-900 overflow-hidden">
            
            {/* Branding Header with zebra stripe touch */}
            <div class="p-5 border-b border-slate-800 bg-gradient-to-r from-slate-900 via-slate-800 to-slate-900 relative">
              <div class="absolute inset-x-0 top-0 h-1 bg-repeat-x" style={{ backgroundImage: 'repeating-linear-gradient(45deg, #000, #000 4px, #fff 4px, #fff 8px)' }}></div>
              <div class="flex items-center gap-3 mt-2">
                <span class="px-2 py-1 bg-emerald-500 text-slate-950 font-bold text-xs rounded tracking-wider">ZEBRA English</span>
                <span class="text-xs text-slate-400 font-mono">중등 고난도 [22개정]</span>
              </div>
              <h1 class="text-lg font-bold text-slate-100 mt-2">중등고난도 15-16 plus 어원 단어장</h1>
              
              {/* Comprehensive Study Progress bar */}
              <div class="mt-4">
                <div class="flex justify-between text-xs text-slate-400 mb-1">
                  <span>암기 완료율</span>
                  <span>{Math.round((memorized.size / WORDS_DATABASE.length) * 100)}% ({memorized.size}/{WORDS_DATABASE.length})</span>
                </div>
                <div class="w-full h-1.5 bg-slate-800 rounded-full overflow-hidden">
                  <div class="h-full bg-emerald-500 rounded-full transition-all duration-300" style={{ width: `${(memorized.size / WORDS_DATABASE.length) * 100}%` }}></div>
                </div>
              </div>
            </div>

            {/* Filters Navigation Panel */}
            <div class="p-3 bg-slate-950/40 border-b border-slate-800 grid grid-cols-3 gap-1">
              <button 
                onClick={() => { setFilterMode("all"); setCurrentIndex(0); }}
                class={`py-1.5 px-1 text-center text-xs rounded font-medium transition-colors ${filterMode === "all" ? "bg-slate-800 text-emerald-400 font-semibold" : "text-slate-400 hover:bg-slate-800/40"}`}
              >
                전체 (61)
              </button>
              <button 
                onClick={() => { setFilterMode("bookmarked"); setCurrentIndex(0); }}
                class={`py-1.5 px-1 text-center text-xs rounded font-medium transition-colors flex items-center justify-center gap-1 ${filterMode === "bookmarked" ? "bg-slate-800 text-amber-400 font-semibold" : "text-slate-400 hover:bg-slate-800/40"}`}
              >
                ★ 북마크 ({bookmarked.size})
              </button>
              <button 
                onClick={() => { setFilterMode("not_memorized"); setCurrentIndex(0); }}
                class={`py-1.5 px-1 text-center text-xs rounded font-medium transition-colors ${filterMode === "not_memorized" ? "bg-slate-800 text-emerald-300 font-semibold" : "text-slate-400 hover:bg-slate-800/40"}`}
              >
                미암기 ({61 - memorized.size})
              </button>
            </div>

            {/* Smart Search Field */}
            <div class="p-3 border-b border-slate-800 relative bg-slate-900">
              <input 
                type="text" 
                placeholder="단어, 뜻, 어근 단어 검색..." 
                value={searchQuery}
                onChange={(e) => { setSearchQuery(e.target.value); setCurrentIndex(0); }}
                class="w-full pl-8 pr-4 py-1.5 bg-slate-950 border border-slate-800 rounded-lg text-xs text-slate-200 placeholder-slate-500 focus:outline-none focus:border-emerald-500 transition-colors"
              />
              <svg class="w-3.5 h-3.5 absolute left-6 top-5 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
              </svg>
            </div>

            {/* List scroll wrapper */}
            <div class="flex-1 overflow-y-auto divide-y divide-slate-800 bg-slate-950/20">
              {filteredWords.length === 0 ? (
                <div class="p-8 text-center text-xs text-slate-500">
                  해당되는 단어가 없습니다.
                </div>
              ) : (
                filteredWords.map((item, idx) => {
                  const isActive = currentWord && currentWord.id === item.id;
                  return (
                    <div 
                      key={item.id}
                      onClick={() => { setCurrentIndex(idx); setShowMeaning(true); }}
                      class={`p-3 text-left cursor-pointer transition-all flex items-center justify-between ${isActive ? "bg-emerald-950/40 border-l-4 border-emerald-500 pl-2" : "hover:bg-slate-800/20"}`}
                    >
                      <div class="min-w-0 pr-2">
                        <div class="flex items-center gap-1.5">
                          <span class="text-[10px] font-mono text-slate-500">{item.id}.</span>
                          <span class={`font-bold text-sm tracking-tight ${isActive ? "text-emerald-300" : "text-slate-200"}`}>{item.word}</span>
                        </div>
                        <p class="text-xs text-slate-400 truncate mt-0.5">{item.meaning}</p>
                      </div>
                      <div class="flex items-center gap-1" onClick={e => e.stopPropagation()}>
                        <button 
                          onClick={() => toggleBookmark(item.id)}
                          class={`p-1 rounded text-xs transition-colors ${bookmarked.has(item.id) ? "text-amber-400" : "text-slate-600 hover:text-slate-400"}`}
                        >
                          ★
                        </button>
                        <button 
                          onClick={() => toggleMemorized(item.id)}
                          class={`p-1 rounded text-xs transition-colors ${memorized.has(item.id) ? "text-emerald-400" : "text-slate-600 hover:text-slate-400"}`}
                        >
                          ✔
                        </button>
                      </div>
                    </div>
                  );
                })
              )}
            </div>
          </div>

          {/* MAIN STUDY AREA: Study Card (One word per page) */}
          <div class="flex-1 min-h-0 flex flex-col bg-slate-950 relative overflow-y-auto">
            
            {/* Top Toolbar */}
            <div class="p-4 bg-slate-900 border-b border-slate-800 flex items-center justify-between">
              <div class="flex items-center gap-2">
                <span class="text-xs text-slate-400 font-mono">카드 {currentIndex + 1} / {filteredWords.length || 0}</span>
                {filteredWords.length > 0 && (
                  <span class="px-2 py-0.5 bg-slate-800 rounded-full text-[10px] font-medium text-slate-300">
                    ID: {currentWord?.id}
                  </span>
                )}
              </div>
              
              {/* Audio and Play Speed controls */}
              <div class="flex items-center gap-3">
                <div class="flex items-center gap-1">
                  <span class="text-[10px] text-slate-500">낭독 속도</span>
                  <select 
                    value={speechRate} 
                    onChange={(e) => setSpeechRate(parseFloat(e.target.value))}
                    class="bg-slate-800 text-[10px] text-slate-300 rounded border border-slate-700 px-1 py-0.5"
                  >
                    <option value="0.7">0.7x (느리게)</option>
                    <option value="0.9">0.9x (기본)</option>
                    <option value="1.1">1.1x (빠르게)</option>
                  </select>
                </div>
                <button 
                  onClick={() => setIsPlaying(!isPlaying)}
                  class={`px-3 py-1 text-xs font-semibold rounded-full flex items-center gap-1.5 transition-all ${isPlaying ? "bg-red-500 text-white" : "bg-emerald-500 text-slate-950"}`}
                >
                  {isPlaying ? (
                    <>
                      <span class="w-1.5 h-1.5 bg-white rounded-full animate-ping"></span>
                      정지
                    </>
                  ) : "▶ 자동 재생"}
                </button>
              </div>
            </div>

            {/* Main Stage Panel Container */}
            <div class="flex-1 flex items-center justify-center p-4 md:p-8">
              {currentWord ? (
                <div class="w-full max-w-2xl bg-slate-900 border border-slate-800 rounded-3xl shadow-2xl overflow-hidden fade-in flex flex-col relative min-h-[480px]">
                  
                  {/* Subtle decorative Zebra Stripe header inside the card */}
                  <div class="h-1 bg-repeat-x" style={{ backgroundImage: 'repeating-linear-gradient(45deg, #000, #000 4px, #10b981 4px, #10b981 8px)' }}></div>

                  {/* Card Main Body */}
                  <div class="p-6 md:p-10 flex-1 flex flex-col justify-between">
                    
                    {/* Header bar of the active card */}
                    <div class="flex items-center justify-between mb-6">
                      <button 
                        onClick={() => toggleBookmark(currentWord.id)}
                        class={`flex items-center gap-1 px-3 py-1 rounded-full text-xs font-medium border transition-all ${bookmarked.has(currentWord.id) ? "border-amber-500/30 bg-amber-500/10 text-amber-400" : "border-slate-800 hover:border-slate-700 text-slate-400"}`}
                      >
                        ★ {bookmarked.has(currentWord.id) ? "북마크 해제" : "중요 단어 추가"}
                      </button>

                      <div class="flex gap-2">
                        <button 
                          onClick={() => playPronunciation(currentWord.word)}
                          class="p-2 rounded-full bg-slate-800 hover:bg-slate-700 transition-colors text-emerald-400"
                          title="영어 발음 듣기"
                        >
                          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                          </svg>
                        </button>
                        <button 
                          onClick={() => toggleMemorized(currentWord.id)}
                          class={`flex items-center gap-1 px-3 py-1 rounded-full text-xs font-medium border transition-all ${memorized.has(currentWord.id) ? "border-emerald-500/30 bg-emerald-500/10 text-emerald-400" : "border-slate-800 hover:border-slate-700 text-slate-400"}`}
                        >
                          ✔ {memorized.has(currentWord.id) ? "암기 완료!" : "외웠음"}
                        </button>
                      </div>
                    </div>

                    {/* Dynamic Vocabulary Content Section */}
                    <div class="text-center my-auto py-4">
                      {/* English Word */}
                      <h2 class="text-3xl md:text-4xl font-extrabold tracking-tight text-white mb-6 select-all font-sans">
                        {currentWord.word}
                      </h2>

                      {/* Korean Meaning (Interactive Hide / Reveal) */}
                      <div class="min-h-[80px] flex flex-col items-center justify-center">
                        {showMeaning ? (
                          <div class="fade-in">
                            <p class="text-xl md:text-2xl font-bold text-emerald-400">
                              {currentWord.meaning}
                            </p>
                            <button 
                              onClick={() => playMeaning(currentWord.meaning)}
                              class="text-[11px] text-slate-500 hover:text-slate-400 mt-2 flex items-center gap-1 mx-auto"
                            >
                              🔊 한국어 뜻 읽기
                            </button>
                          </div>
                        ) : (
                          <button 
                            onClick={() => setShowMeaning(true)}
                            class="px-5 py-2.5 bg-slate-800 hover:bg-slate-700 text-slate-300 font-medium text-sm rounded-xl border border-slate-700 transition-all shadow-md active:scale-95"
                          >
                            👁 뜻 확인하기 (스페이스바)
                          </button>
                        )}
                      </div>
                    </div>

                    {/* ETYMOLOGY CARD: Beautifully detailed and short explanation */}
                    <div class="mt-8 border-t border-slate-800 pt-6 text-left">
                      <div class="bg-slate-950/60 rounded-2xl p-4 md:p-5 border border-slate-800/80">
                        <div class="flex items-center gap-2 mb-3">
                          <span class="inline-block w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                          <span class="text-xs uppercase font-extrabold tracking-widest text-emerald-500">어원 분석 (Etymology)</span>
                        </div>
                        
                        {/* Root Breakdown */}
                        <div class="flex flex-wrap items-center gap-2 mb-3 text-xs md:text-sm font-semibold">
                          <span class="px-2.5 py-1 bg-slate-800 rounded text-slate-300 border border-slate-700">형태 구조: <b class="text-emerald-400">{currentWord.prefix}</b></span>
                        </div>

                        {/* Story Paragraph */}
                        <p class="text-slate-300 text-xs md:text-[13px] leading-relaxed font-normal mb-3">
                          {currentWord.story}
                        </p>

                        {/* COGNATES (Same roots related words list) */}
                        {currentWord.related && (
                          <div class="mt-3 pt-3 border-t border-slate-800/80">
                            <div class="flex items-center gap-1.5 mb-1">
                              <span class="text-[10px] font-extrabold text-amber-400 uppercase tracking-wider">같은 어근 공유 단어 (Cognates)</span>
                            </div>
                            <div class="text-xs text-slate-200 font-medium tracking-tight">
                              {currentWord.related}
                            </div>
                          </div>
                        )}

                      </div>
                    </div>

                  </div>
                </div>
              ) : (
                <div class="text-center p-8 bg-slate-900 rounded-2xl border border-slate-800">
                  <p class="text-slate-400 mb-2">선택한 필터 조건에 부합하는 단어가 없습니다.</p>
                  <button 
                    onClick={() => { setFilterMode("all"); setSearchQuery(""); }}
                    class="mt-2 text-xs text-emerald-400 font-semibold underline"
                  >
                    필터 및 검색 초기화
                  </button>
                </div>
              )}
            </div>

            {/* Slide Navigation Foot Controller */}
            <div class="p-6 bg-slate-900 border-t border-slate-800 flex items-center justify-between">
              <button 
                onClick={handlePrev}
                disabled={filteredWords.length <= 1}
                class="px-5 py-2.5 rounded-xl bg-slate-800 hover:bg-slate-700 text-slate-200 text-sm font-semibold flex items-center gap-2 transition-all disabled:opacity-30 disabled:pointer-events-none active:scale-95"
              >
                ◀ 이전 단어
              </button>
              
              <div class="hidden sm:flex items-center gap-2 text-xs text-slate-500">
                <span class="px-2 py-1 bg-slate-950 border border-slate-800 rounded">← 이전</span>
                <span class="px-2 py-1 bg-slate-950 border border-slate-800 rounded">→ 다음</span>
                <span class="px-2 py-1 bg-slate-950 border border-slate-800 rounded">Space 뜻가리기</span>
              </div>

              <button 
                onClick={handleNext}
                disabled={filteredWords.length <= 1}
                class="px-5 py-2.5 rounded-xl bg-emerald-500 hover:bg-emerald-400 text-slate-950 text-sm font-bold flex items-center gap-2 transition-all disabled:opacity-30 disabled:pointer-events-none active:scale-95 shadow-lg shadow-emerald-500/10"
              >
                다음 단어 ▶
              </button>
            </div>

          </div>
        </div>
      );
    }

    // Mount Application
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
